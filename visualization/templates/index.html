<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>农业股行情实时监控 - 含预测</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.2/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@0.21.1/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #0a0e27; color: #fff; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 30px; background: linear-gradient(90deg, #1a1f3a 0%, #0f1428 100%); border-bottom: 2px solid #1e90ff; }
        .header h1 { font-size: 24px; color: #fff; display: flex; align-items: center; gap: 12px; }
        .header h1::before { content: ""; display: inline-block; width: 6px; height: 28px; background: linear-gradient(180deg, #4ECDC4, #45B7D1); border-radius: 3px; }
        .status { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .live-tag { background: #ff4444; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .live-tag.active { background: #00ff88; color: #000; }

        .tabs { display: flex; gap: 8px; padding: 12px 30px; background: #0f1428; border-bottom: 1px solid #1a1f3a; }
        .tab { padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab.active { background: #4ECDC4; color: #000; }
        .tab:not(.active) { background: #1a1f3a; color: #888; }
        .tab:not(.active):hover { background: #252a4a; }

        .search-bar { display: flex; gap: 12px; padding: 12px 30px; background: #0f1428; border-bottom: 1px solid #1a1f3a; }
        .search-group { display: flex; align-items: center; gap: 8px; }
        .search-label { font-size: 13px; color: #888; }
        .search-input { padding: 8px 12px; background: #1a1f3a; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 13px; }
        .search-input:focus { outline: none; border-color: #4ECDC4; }
        .search-btn { padding: 8px 20px; background: #4ECDC4; border: none; border-radius: 4px; color: #000; font-size: 13px; cursor: pointer; font-weight: bold; }
        .search-btn:hover { background: #45B7D1; }
        .search-result { font-size: 12px; color: #4ECDC4; margin-left: auto; line-height: 32px; }

        .stats-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; padding: 20px 30px; }
        .stat-card { background: linear-gradient(135deg, #1a1f3a 0%, #131836 100%); padding: 16px 20px; border-radius: 8px; border: 1px solid rgba(78,205,196,0.2); }
        .stat-label { font-size: 12px; color: #888; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #4ECDC4; }
        .stat-value.up { color: #ff5252; }
        .stat-value.down { color: #00ff88; }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 30px 20px; }
        .chart-box { background: linear-gradient(135deg, #1a1f3a 0%, #131836 100%); padding: 16px; border-radius: 8px; border: 1px solid rgba(78,205,196,0.2); }
        .chart-title { font-size: 15px; color: #4ECDC4; margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #4ECDC4; display: flex; justify-content: space-between; align-items: center; }
        .chart-title small { font-size: 11px; color: #888; font-weight: normal; }
        .chart { width: 100%; height: 650px; }

        .stocks-section { padding: 0 30px 30px; }
        .stocks-title { font-size: 16px; color: #4ECDC4; margin-bottom: 16px; padding-left: 12px; border-left: 3px solid #4ECDC4; }
        .stocks-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .stock-card { background: linear-gradient(135deg, #1a1f3a 0%, #131836 100%); padding: 16px; border-radius: 8px; border: 1px solid rgba(78,205,196,0.15); transition: all 0.3s; cursor: pointer; }
        .stock-card:hover { border-color: #4ECDC4; transform: translateY(-2px); }
        .stock-card.selected { border-color: #4ECDC4; box-shadow: 0 0 15px rgba(78,205,196,0.3); }
        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stock-name { font-size: 15px; font-weight: bold; }
        .stock-code { font-size: 12px; color: #888; }
        .stock-price { font-size: 26px; font-weight: bold; margin: 8px 0; }
        .stock-price.up { color: #ff5252; }
        .stock-price.down { color: #00ff88; }
        .stock-price.flat { color: #fff; }
        .stock-change { display: flex; gap: 12px; font-size: 13px; }
        .change-pct.up { color: #ff5252; }
        .change-pct.down { color: #00ff88; }
        .stock-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #888; }
        .stock-meta span { color: #aaa; }

        .predict-panel { display: none; padding: 0; }
        .predict-panel.active { display: block; }
        .predict-header { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; padding: 0 10px; }
        .predict-select { padding: 8px 16px; background: #1a1f3a; border: 1px solid #4ECDC4; border-radius: 4px; color: #fff; font-size: 14px; }
        .predict-info { font-size: 12px; color: #888; }
        .predict-chart-box { background: linear-gradient(135deg, #1a1f3a 0%, #131836 100%); padding: 16px 5px; border-radius: 0; border-left: none; border-right: none; border-top: 1px solid rgba(78,205,196,0.2); border-bottom: 1px solid rgba(78,205,196,0.2); width: 100%; margin: 0; overflow: hidden; }
        .predict-results { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 16px; padding: 0 30px 30px; }
        .predict-card { background: rgba(78,205,196,0.1); padding: 12px; border-radius: 6px; text-align: center; }
        .predict-date { font-size: 12px; color: #888; }
        .predict-price { font-size: 18px; font-weight: bold; color: #4ECDC4; }
        .predict-confidence { font-size: 11px; color: #888; }

        .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>农业类上市公司实时行情监控</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
            <span class="live-tag" id="liveTag">LIVE</span>
            <span id="lastUpdate" style="color: #888; font-size: 12px;"></span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="market">实时行情</div>
        <div class="tab" data-tab="predict">价格预测</div>
        <div class="tab" data-tab="query">数据查询</div>
    </div>

    <div class="search-bar" id="searchBar" style="display: none;">
        <div class="search-group">
            <span class="search-label">股票代码:</span>
            <select class="search-input" id="queryStockCode" style="width: 150px;">
                <option value="">全部股票</option>
            </select>
        </div>
        <div class="search-group">
            <span class="search-label">开始日期:</span>
            <input type="date" class="search-input" id="queryStartDate" value="">
        </div>
        <div class="search-group">
            <span class="search-label">结束日期:</span>
            <input type="date" class="search-input" id="queryEndDate" value="">
        </div>
        <div class="search-group">
            <span class="search-label">公司名称:</span>
            <input type="text" class="search-input" id="queryCompany" placeholder="输入公司名称">
        </div>
        <button class="search-btn" onclick="queryData()">查询</button>
        <button class="search-btn" onclick="resetSearch()">重置</button>
        <span class="search-result" id="searchResult"></span>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-label">监控股票数</div>
            <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">上涨 / 下跌 / 平盘</div>
            <div class="stat-value">
                <span class="up" id="statUp">0</span> /
                <span class="down" id="statDown">0</span> /
                <span id="statFlat">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-label">平均涨跌幅</div>
            <div class="stat-value" id="statAvgChange">0.00%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">平均收盘价</div>
            <div class="stat-value" id="statAvgPrice">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">总成交量(手)</div>
            <div class="stat-value" id="statTotalVolume">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">总市值合计(亿元)</div>
            <div class="stat-value" id="statTotalCap">0.00</div>
        </div>
    </div>

    <div class="charts-row" id="marketCharts">
        <div class="chart-box">
            <div class="chart-title">当日涨幅TOP10 <small>（红色上涨，绿色下跌）</small></div>
            <div id="growthChart" class="chart"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">总市值TOP10</div>
            <div id="marketCapChart" class="chart"></div>
        </div>
    </div>

    <div class="stocks-section" id="marketStocks">
        <div class="stocks-title">全量股票实时行情</div>
        <div class="stocks-grid" id="stocksGrid"></div>
    </div>

    <div class="predict-panel" id="predictPanel">
        <div class="predict-header">
            <select class="predict-select" id="stockSelect">
                <option value="">请选择股票</option>
            </select>
            <input type="date" class="search-input" id="predictDate" value="" style="width: 140px;">
            <button class="search-btn" onclick="loadPredictionByDate()">查询预测</button>
            <span class="predict-info">基于LSTM模型的价格趋势预测（未来5天）</span>
        </div>
        <div class="predict-chart-box">
            <div class="chart-title">价格预测趋势</div>
            <div id="predictChart" class="chart"></div>
        </div>
        <div class="predict-results" id="predictResults"></div>
    </div>

    <div class="predict-panel" id="queryPanel">
        <div class="predict-header">
            <span class="predict-info">历史数据查询结果</span>
        </div>
        <div class="predict-chart-box">
            <div class="chart-title">查询结果</div>
            <div id="queryResultGrid" style="height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="footer">
        数据来源：腾讯财经  LSTM预测仅供参考，不构成投资建议
    </div>

    <script>
        const growthChart = echarts.init(document.getElementById("growthChart"));
        const marketCapChart = echarts.init(document.getElementById("marketCapChart"));
        const predictChart = echarts.init(document.getElementById("predictChart"));
        const stocksGrid = document.getElementById("stocksGrid");
        const stockSelect = document.getElementById("stockSelect");

        let currentStockCode = "";
        let cachedPredictions = {};

        function initCharts() {
            growthChart.setOption({
                backgroundColor: "transparent",
                tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
                grid: { left: 50, right: 30, top: 20, bottom: 60 },
                xAxis: { type: "category", data: [], axisLabel: { color: "#aaa", rotate: 30, fontSize: 10 }, axisLine: { lineStyle: { color: "#444" } } },
                yAxis: { type: "value", axisLabel: { color: "#aaa", formatter: "{value}%" }, axisLine: { lineStyle: { color: "#444" } }, splitLine: { lineStyle: { color: "rgba(255,255,255,0.05)" } } },
                series: [{ type: "bar", data: [], itemStyle: { color: function(p) { return p.value >= 0 ? "#ff5252" : "#00ff88"; } }, label: { show: true, position: "top", color: "#fff", fontSize: 10, formatter: "{c}%" } }]
            });

            marketCapChart.setOption({
                backgroundColor: "transparent",
                tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
                grid: { left: 80, right: 50, top: 20, bottom: 30 },
                xAxis: { type: "value", axisLabel: { color: "#aaa", formatter: "{value}亿" }, axisLine: { lineStyle: { color: "#444" } }, splitLine: { lineStyle: { color: "rgba(255,255,255,0.05)" } } },
                yAxis: { type: "category", data: [], inverse: true, axisLabel: { color: "#aaa", fontSize: 11 }, axisLine: { lineStyle: { color: "#444" } } },
                series: [{ type: "bar", data: [], itemStyle: { color: { type: "linear", x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: "#45B7D1" }, { offset: 1, color: "#4ECDC4" }] } }, label: { show: true, position: "right", color: "#fff", fontSize: 10, formatter: "{c}亿" } }]
            });

            predictChart.setOption({
                backgroundColor: "transparent",
                tooltip: { trigger: "axis", axisPointer: { type: "line" } },
                grid: { left: 40, right: 30, top: 40, bottom: 80 },
                xAxis: { 
                    type: "category", 
                    data: [], 
                    axisLabel: { 
                        color: "#ccc", 
                        fontSize: 11,
                        interval: 0,
                        rotate: 30,
                        margin: 25
                    }, 
                    axisLine: { lineStyle: { color: "#555" } },
                    axisTick: { show: true, interval: 0, alignWithLabel: true, length: 8 },
                    axisPointer: { show: false },
                    boundaryGap: [0.1, 0.1]
                },
                yAxis: { 
                    type: "value", 
                    axisLabel: { color: "#ccc", fontSize: 11 }, 
                    axisLine: { lineStyle: { color: "#555" } },
                    splitLine: { lineStyle: { color: "rgba(255,255,255,0.05)" } } 
                },
                series: [
                    {
                        name: "当前价格",
                        type: "line",
                        data: [],
                        smooth: true,
                        symbol: "circle",
                        symbolSize: 8,
                        lineStyle: { color: "#4ECDC4", width: 3 },
                        itemStyle: { color: "#4ECDC4" },
                        areaStyle: { color: { type: "linear", x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: "rgba(78,205,196,0.3)" }, { offset: 1, color: "rgba(78,205,196,0)" }] } }
                    },
                    {
                        name: "预测价格",
                        type: "line",
                        data: [],
                        smooth: true,
                        symbol: "diamond",
                        symbolSize: 10,
                        lineStyle: { color: "#ff5252", width: 2, type: "dashed" },
                        itemStyle: { color: "#ff5252" },
                        areaStyle: { color: { type: "linear", x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: "rgba(255,82,82,0.2)" }, { offset: 1, color: "rgba(255,82,82,0)" }] } }
                    }
                ],
                legend: { 
                    data: ["当前价格", "预测价格"],
                    textStyle: { color: "#ccc" },
                    top: 10
                }
            });
        }

        function formatVolume(v) {
            if (v >= 1e8) return (v / 1e8).toFixed(2) + "亿";
            if (v >= 1e4) return (v / 1e4).toFixed(2) + "万";
            return v.toString();
        }

        function updateAll(data, lastUpdate) {
            if (!data || data.length === 0) return;

            const up = data.filter(d => d.change_percent > 0).length;
            const down = data.filter(d => d.change_percent < 0).length;
            const flat = data.filter(d => d.change_percent === 0).length;
            const avgChange = (data.reduce((s, d) => s + d.change_percent, 0) / data.length).toFixed(2);
            const avgPrice = (data.reduce((s, d) => s + d.price, 0) / data.length).toFixed(2);
            const totalVolume = (data.reduce((s, d) => s + d.volume, 0) / 100).toFixed(0);
            const totalCap = data.reduce((s, d) => s + d.market_cap, 0).toFixed(2);

            document.getElementById("statTotal").textContent = data.length;
            document.getElementById("statUp").textContent = up;
            document.getElementById("statDown").textContent = down;
            document.getElementById("statFlat").textContent = flat;
            document.getElementById("statAvgChange").textContent = avgChange + "%";
            document.getElementById("statAvgChange").className = "stat-value " + (parseFloat(avgChange) >= 0 ? "up" : "down");
            document.getElementById("statAvgPrice").textContent = avgPrice;
            document.getElementById("statTotalVolume").textContent = formatVolume(parseInt(totalVolume));
            document.getElementById("statTotalCap").textContent = totalCap;
            document.getElementById("lastUpdate").textContent = "更新时间: " + (lastUpdate || "-");

            const sortedData = [...data].sort((a, b) => a.stock_name.localeCompare(b.stock_name));
            const currentPredictSelect = stockSelect.value;
            const currentQuerySelect = document.getElementById("queryStockCode")?.value || "";
            
            stockSelect.innerHTML = '<option value="">请选择股票</option>' + sortedData.map(d => `<option value="${d.stock_code}">${d.stock_name}(${d.stock_code})</option>`).join("");
            if (currentPredictSelect) {
                stockSelect.value = currentPredictSelect;
            }
            
            const queryStockCode = document.getElementById("queryStockCode");
            if (queryStockCode) {
                queryStockCode.innerHTML = '<option value="">全部股票</option>' + sortedData.map(d => `<option value="${d.stock_code}">${d.stock_name}(${d.stock_code})</option>`).join("");
                if (currentQuerySelect) {
                    queryStockCode.value = currentQuerySelect;
                }
            }

            const topGrowth = [...data].sort((a, b) => b.change_percent - a.change_percent).slice(0, 10);
            growthChart.setOption({ xAxis: { data: topGrowth.map(d => d.stock_name) }, series: [{ data: topGrowth.map(d => d.change_percent) }] });

            const topCap = [...data].sort((a, b) => b.market_cap - a.market_cap).slice(0, 10);
            marketCapChart.setOption({ yAxis: { data: topCap.map(d => d.stock_name) }, series: [{ data: topCap.map(d => d.market_cap) }] });

            stocksGrid.innerHTML = data.map(d => {
                const priceClass = d.change_percent > 0 ? "up" : d.change_percent < 0 ? "down" : "flat";
                const selectedClass = currentStockCode === d.stock_code ? "selected" : "";
                return `
                <div class="stock-card ${selectedClass}" onclick="selectStock('${d.stock_code}', '${d.stock_name}')">
                    <div class="stock-header"><div class="stock-name">${d.stock_name}</div><div class="stock-code">${d.stock_code}</div></div>
                    <div class="stock-price ${priceClass}">${d.price.toFixed(2)}</div>
                    <div class="stock-change"><span class="change-pct ${priceClass}">${d.change_percent >= 0 ? "+" : ""}${d.change_percent.toFixed(2)}%</span><span class="change-pct ${priceClass}">${d.change >= 0 ? "+" : ""}${d.change.toFixed(2)}</span></div>
                    <div class="stock-meta"><span>成交量: <b>${formatVolume(d.volume)}</b></span><span>成交额: <b>${formatVolume(d.amount)}</b></span></div>
                </div>`;
            }).join("");
        }

        function selectStock(code, name) {
            currentStockCode = code;
            document.querySelectorAll(".stock-card").forEach(c => c.classList.remove("selected"));
            document.querySelector(`#stocksGrid .stock-card`).classList.add("selected");
            document.querySelector(".tabs .tab[data-tab='predict']").click();
            stockSelect.value = code;
            loadPrediction(code, name);
        }

        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                
                const tabName = tab.dataset.tab;
                if (tabName === "market") {
                    document.getElementById("marketCharts").style.display = "grid";
                    document.getElementById("marketStocks").style.display = "block";
                    document.getElementById("predictPanel").classList.remove("active");
                    document.getElementById("queryPanel").classList.remove("active");
                    document.getElementById("searchBar").style.display = "none";
                } else if (tabName === "predict") {
                    document.getElementById("marketCharts").style.display = "none";
                    document.getElementById("marketStocks").style.display = "none";
                    document.getElementById("predictPanel").classList.add("active");
                    document.getElementById("queryPanel").classList.remove("active");
                    document.getElementById("searchBar").style.display = "none";
                    if (stockSelect.value) {
                        loadPrediction(stockSelect.value);
                    }
                } else if (tabName === "query") {
                    document.getElementById("marketCharts").style.display = "none";
                    document.getElementById("marketStocks").style.display = "none";
                    document.getElementById("predictPanel").classList.remove("active");
                    document.getElementById("queryPanel").classList.add("active");
                    document.getElementById("searchBar").style.display = "flex";
                }
            });
        });

        stockSelect.addEventListener("change", () => {
            const code = stockSelect.value;
            if (code) {
                const option = stockSelect.options[stockSelect.selectedIndex];
                const name = option.textContent.split("(")[0];
                currentStockCode = code;
                loadPrediction(code, name);
            }
        });

        function loadPrediction(stockCode, stockName) {
            if (cachedPredictions[stockCode]) {
                renderPrediction(stockCode, cachedPredictions[stockCode]);
                return;
            }

            axios.get(`/api/predict/${stockCode}`)
                .then(res => {
                    const data = res.data;
                    if (data.success) {
                        cachedPredictions[stockCode] = data;
                        renderPrediction(stockCode, data);
                    }
                })
                .catch(err => {
                    console.log("加载预测数据失败:", err);
                });
        }

        function loadPredictionByDate() {
            const stockCode = stockSelect.value;
            const date = document.getElementById("predictDate").value;
            
            if (!stockCode) {
                alert("请先选择股票");
                return;
            }

            if (!date) {
                loadPrediction(stockCode);
                return;
            }

            axios.get(`/api/predict/${stockCode}?date=${date}`)
                .then(res => {
                    const data = res.data;
                    if (data.success) {
                        alert(`${stockCode} 在 ${date} 的预测价格: ${data.prediction.predicted_price}元 (置信度: ${data.prediction.confidence*100}%)`);
                    } else {
                        alert(data.message || "未找到该日期的预测数据");
                    }
                })
                .catch(err => {
                    alert("查询失败: " + err.message);
                });
        }

        function renderPrediction(stockCode, data) {
            if (!data || !data.predictions) return;

            const currentPrice = data.current_price;
            const predictions = data.predictions;
            
            const dates = predictions.map(p => p.date);
            const predictPrices = predictions.map(p => p.predicted_price);
            
            const xData = ["当前"].concat(dates);
            const currentData = [currentPrice].concat(new Array(dates.length).fill(null));
            const predictData = [null].concat(predictPrices);

            predictChart.setOption({
                xAxis: { data: xData },
                series: [
                    { data: currentData },
                    { data: predictData }
                ]
            });

            document.getElementById("predictResults").innerHTML = predictions.map(p => `
                <div class="predict-card">
                    <div class="predict-date">${p.date}</div>
                    <div class="predict-price">${p.predicted_price}</div>
                    <div class="predict-confidence">置信度: ${(p.confidence*100).toFixed(0)}%</div>
                </div>
            `).join("");
        }

        function queryData() {
            const stockCode = document.getElementById("queryStockCode").value;
            const startDate = document.getElementById("queryStartDate").value;
            const endDate = document.getElementById("queryEndDate").value;
            const company = document.getElementById("queryCompany").value;
            
            if (!stockCode && !startDate && !endDate && !company) {
                alert("请输入至少一个查询条件");
                document.getElementById("searchResult").textContent = "请输入至少一个查询条件";
                return;
            }
            
            let url = "";
            let params = [];
            
            if (company) {
                url = "/api/query/company";
                params.push(`name=${encodeURIComponent(company)}`);
            } else if (stockCode) {
                url = "/api/query/history";
                params.push(`stock_code=${encodeURIComponent(stockCode)}`);
                if (startDate) params.push(`start_date=${startDate}`);
                if (endDate) params.push(`end_date=${endDate}`);
            } else if (startDate || endDate) {
                url = "/api/query/date";
                if (startDate) params.push(`date=${startDate}`);
            } else {
                alert("请选择股票或输入查询条件");
                return;
            }
            
            if (params.length > 0) {
                url += "?" + params.join("&");
            }
            
            document.getElementById("searchResult").textContent = "正在查询...";
            
            axios.get(url)
                .then(res => {
                    let data = res.data;
                    let count = 0;
                    
                    if (data.error) {
                        alert("查询失败：" + data.error);
                        document.getElementById("searchResult").textContent = "查询失败";
                        document.getElementById("queryResultGrid").innerHTML = `<div style='text-align:center;color:#ff5252;padding:50px'>${data.error}</div>`;
                        return;
                    }
                    
                    if (data.data) {
                        count = data.data.length;
                        data = data.data;
                    } else if (Array.isArray(data)) {
                        count = data.length;
                    } else {
                        count = data.count || 0;
                        data = data.data || [];
                    }
                    
                    if (count === 0) {
                        alert("未找到符合条件的记录");
                        document.getElementById("searchResult").textContent = "查询结果: 0 条记录";
                        document.getElementById("queryResultGrid").innerHTML = "<div style='text-align:center;color:#888;padding:50px'>未找到符合条件的记录</div>";
                        return;
                    }
                    
                    document.getElementById("searchResult").textContent = `查询结果: ${count} 条记录`;
                    alert(`查询成功！找到 ${count} 条记录`);
                    renderQueryResults(data);
                })
                .catch(err => {
                    alert("查询失败：" + err.message);
                    document.getElementById("searchResult").textContent = "查询失败: " + err.message;
                    document.getElementById("queryResultGrid").innerHTML = `<div style='text-align:center;color:#ff5252;padding:50px'>查询失败: ${err.message}</div>`;
                });
        }

        function resetSearch() {
            document.getElementById("queryStockCode").value = "";
            document.getElementById("queryStartDate").value = "";
            document.getElementById("queryEndDate").value = "";
            document.getElementById("queryCompany").value = "";
            document.getElementById("searchResult").textContent = "";
            document.getElementById("queryResultGrid").innerHTML = "<div style='text-align:center;color:#888;padding:50px'>请输入查询条件进行查询</div>";
        }

        function renderQueryResults(data) {
            if (!data || data.length === 0) {
                document.getElementById("queryResultGrid").innerHTML = "<div style='text-align:center;color:#888;padding:50px'>暂无数据</div>";
                return;
            }
            
            const table = `
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="background:#1a1f3a;">
                            <th style="padding:10px;text-align:left;color:#4ECDC4;border-bottom:1px solid #333;">股票代码</th>
                            <th style="padding:10px;text-align:left;color:#4ECDC4;border-bottom:1px solid #333;">股票名称</th>
                            <th style="padding:10px;text-align:right;color:#4ECDC4;border-bottom:1px solid #333;">收盘价</th>
                            <th style="padding:10px;text-align:right;color:#4ECDC4;border-bottom:1px solid #333;">涨跌幅</th>
                            <th style="padding:10px;text-align:right;color:#4ECDC4;border-bottom:1px solid #333;">成交量</th>
                            <th style="padding:10px;text-align:right;color:#4ECDC4;border-bottom:1px solid #333;">成交额</th>
                            <th style="padding:10px;text-align:right;color:#4ECDC4;border-bottom:1px solid #333;">市值(亿)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(row => {
                            const changeClass = row.change_percent > 0 ? "color:#ff5252" : row.change_percent < 0 ? "color:#00ff88" : "color:#fff";
                            return `
                                <tr style="border-bottom:1px solid #1a1f3a;">
                                    <td style="padding:10px;color:#aaa;">${row.stock_code}</td>
                                    <td style="padding:10px;color:#fff;">${row.stock_name || "-"}</td>
                                    <td style="padding:10px;text-align:right;color:#fff;">${row.closing_price || row.price || "-"}</td>
                                    <td style="padding:10px;text-align:right;${changeClass};">${row.change_percent > 0 ? "+" : ""}${row.change_percent || "-"}%</td>
                                    <td style="padding:10px;text-align:right;color:#aaa;">${formatVolume(row.volume || 0)}</td>
                                    <td style="padding:10px;text-align:right;color:#aaa;">${formatVolume(row.amount || 0)}</td>
                                    <td style="padding:10px;text-align:right;color:#aaa;">${row.market_cap || "-"}</td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
            `;
            document.getElementById("queryResultGrid").innerHTML = table;
        }

        const socket = io({ transports: ["polling", "websocket"] });
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const liveTag = document.getElementById("liveTag");

        socket.on("connect", () => { statusDot.classList.add("connected"); statusText.textContent = "已连接"; liveTag.classList.add("active"); });
        socket.on("disconnect", () => { statusDot.classList.remove("connected"); statusText.textContent = "已断开"; liveTag.classList.remove("active"); });
        socket.on("initial_data", (snap) => { 
            updateAll(snap.data, snap.last_update); 
        });

        window.addEventListener("load", () => {
            initCharts();
            axios.get("/api/stocks").then(res => {
                if (res.data && res.data.data) {
                    updateAll(res.data.data, res.data.last_update);
                }
            }).catch(err => console.log("初始数据加载失败:", err));
        });

        window.addEventListener("resize", () => {
            growthChart.resize();
            marketCapChart.resize();
            predictChart.resize();
        });
    </script>
</body>
</html>
